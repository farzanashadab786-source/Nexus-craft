<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexuscrafts Crafting</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: 'Arial', sans-serif; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Inventory & Crafting UI */
        #top-bar { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px #000; pointer-events: auto; }
        #craft-menu { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 300px; height: 200px; 
            background: rgba(0,0,0,0.8); border: 4px solid #fff; color: white; 
            padding: 20px; pointer-events: auto; text-align: center;
        }
        
        /* Buttons */
        .btn { position: absolute; background: rgba(0,0,0,0.6); color: white; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; pointer-events: auto; font-weight: bold; }
        #craft-btn-open { top: 10px; right: 10px; width: 100px; height: 40px; background: #f39c12; }
        #jump-btn { bottom: 120px; right: 20px; width: 60px; height: 60px; }
        #break-btn { bottom: 20px; right: 20px; width: 80px; height: 80px; background: #c0392b; }
        #place-btn { bottom: 20px; right: 110px; width: 80px; height: 80px; background: #27ae60; }
        
        .recipe-btn { background: #34495e; color: white; border: 1px solid white; padding: 10px; margin: 5px; width: 100%; cursor: pointer; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="top-bar">
            <div>Resources: <span id="res-count">0</span></div>
            <div>Building Material: <span id="build-type">Grass</span></div>
        </div>
        
        <div id="craft-btn-open" class="btn" onclick="toggleCraft()">CRAFT</div>
        
        <div id="craft-menu">
            <h3>CRAFTING TABLE</h3>
            <button class="recipe-btn" onclick="craft('Brick', 3)">3 Resources -> 1 Brick</button>
            <button class="recipe-btn" onclick="craft('Steel', 5)">5 Resources -> 1 Steel</button>
            <button class="recipe-btn" onclick="toggleCraft()" style="background:red">CLOSE</button>
        </div>

        <div id="crosshair"></div>
        <div id="jump-btn" class="btn">JUMP</div>
        <div id="place-btn" class="btn">PLACE</div>
        <div id="break-btn" class="btn">DIG</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));

        // --- GAME DATA ---
        let resources = 0;
        let currentBuildMaterial = 'grass';
        const blocks = [];
        const drops = [];

        const materials = {
            grass: new THREE.MeshLambertMaterial({ color: 0x567d46 }),
            Brick: new THREE.MeshLambertMaterial({ color: 0x964b00 }),
            Steel: new THREE.MeshLambertMaterial({ color: 0x7f8c8d }),
            drop: new THREE.MeshLambertMaterial({ color: 0xffff00 })
        };

        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const dropGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);

        // --- FUNCTIONS ---
        window.toggleCraft = () => {
            const menu = document.getElementById('craft-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.craft = (type, cost) => {
            if (resources >= cost) {
                resources -= cost;
                currentBuildMaterial = type;
                document.getElementById('res-count').innerText = resources;
                document.getElementById('build-type').innerText = type;
                alert("Crafted " + type + "!");
                toggleCraft();
            } else {
                alert("Not enough resources!");
            }
        };

        // Create Ground
        for (let x = -8; x < 8; x++) {
            for (let z = -8; z < 8; z++) {
                const b = new THREE.Mesh(boxGeo, materials.grass);
                b.position.set(x, 0, z);
                scene.add(b);
                blocks.push(b);
            }
        }

        // --- INTERACTION ---
        document.getElementById('break-btn').addEventListener('touchstart', () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(blocks);
            if (hits.length > 0 && hits[0].distance < 4) {
                const obj = hits[0].object;
                const d = new THREE.Mesh(dropGeo, materials.drop);
                d.position.copy(obj.position);
                scene.add(d);
                drops.push(d);
                scene.remove(obj);
                blocks.splice(blocks.indexOf(obj), 1);
            }
        });

        document.getElementById('place-btn').addEventListener('touchstart', () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(blocks);
            if (hits.length > 0 && hits[0].distance < 4) {
                const b = new THREE.Mesh(boxGeo, materials[currentBuildMaterial]);
                b.position.copy(hits[0].point).add(hits[0].face.normal).floor().addScalar(0.5);
                scene.add(b);
                blocks.push(b);
            }
        });

        // --- LOOP ---
        camera.position.set(0, 2, 5);
        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-rotate camera slightly for mobile "look" feel
            camera.rotation.y += 0.002; 

            // Item Collection
            for (let i = drops.length - 1; i >= 0; i--) {
                drops[i].rotation.y += 0.1;
                if (drops[i].position.distanceTo(camera.position) < 2) {
                    scene.remove(drops[i]);
                    drops.splice(i, 1);
                    resources++;
                    document.getElementById('res-count').innerText = resources;
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
