<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexuscrafts</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background-color: white;
            border: 1px solid black;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        #ui {
            position: absolute;
            top: 10px; left: 10px;
            color: white; font-family: sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px; border-radius: 8px;
            pointer-events: none;
            z-index: 100;
        }
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
            color: white; font-family: sans-serif; cursor: pointer; z-index: 200;
        }
        h1 { margin: 0 0 10px 0; font-size: 48px; text-transform: uppercase; letter-spacing: 2px;}
    </style>
</head>
<body>
    <div id="blocker">
        <h1>Nexuscrafts</h1>
        <p>Click anywhere to play!</p>
    </div>
    <div id="crosshair"></div>
    <div id="ui">
        <strong>Controls:</strong><br>
        WASD - Move | Space - Jump<br>
        Left Click - Break Block<br>
        Right Click - Place Block
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting
        const ambientLight = new THREE.AmbientLight(0xcccccc);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 0.5).normalize();
        scene.add(directionalLight);

        // 3. Materials & Geometry
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x228B22 }); // Grass Green
        const buildMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });  // Dirt Brown
        const edgeGeo = new THREE.EdgesGeometry(blockGeo); 
        
        const objects = []; 

        // Generate a flat "Chunk" of ground
        for (let x = -20; x < 20; x++) {
            for (let z = -20; z < 20; z++) {
                const voxel = new THREE.Mesh(blockGeo, groundMat);
                voxel.position.set(x, -1, z);
                scene.add(voxel);
                objects.push(voxel);
                
                const edges = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: 0x000000 }));
                voxel.add(edges);
            }
        }

        // 4. Controls & Physics Variables
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        blocker.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');
        scene.add(controls.getObject());

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();

        // Keyboard inputs
        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 10; canJump = false; break;
            }
        });
        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // 5. Block Placement & Breaking (Raycasting)
        const raycaster = new THREE.Raycaster();
        
        document.addEventListener('mousedown', (event) => {
            if (!controls.isLocked) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(objects, false);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (intersect.distance > 5) return; 

                if (event.button === 0) { // Left Click: Break
                    if (intersect.object.position.y > -1) { 
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                    }
                } else if (event.button === 2) { // Right Click: Place
                    const voxel = new THREE.Mesh(blockGeo, buildMat);
                    voxel.position.copy(intersect.point).add(intersect.face.normal);
                    voxel.position.divideScalar(1).floor().multiplyScalar(1).addScalar(0.5);
                    scene.add(voxel);
                    objects.push(voxel);
                    
                    const edges = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: 0x000000 }));
                    voxel.add(edges);
                }
            }
        });

        // 6. Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked) {
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 30.0 * delta; // Gravity

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                if (moveForward || moveBackward) velocity.z -= direction.z * 50.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 50.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 1) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1;
                    canJump = true;
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
