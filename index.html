<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexuscrafts Stable</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: white; }
        
        /* Stats & Inventory */
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 5px; }
        
        /* Menu */
        #craft-menu { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; background: rgba(0,0,0,0.9); border: 2px solid gold; padding: 20px; pointer-events: auto; text-align: center;
        }

        /* Buttons */
        .btn { position: absolute; background: rgba(0,0,0,0.6); color: white; border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; font-weight: bold; font-size: 14px; width: 70px; height: 70px; }
        #btn-craft { top: 10px; right: 10px; border-radius: 5px; height: 40px; width: 80px; background: orange; }
        #btn-jump { bottom: 100px; right: 20px; }
        #btn-dig { bottom: 20px; right: 20px; background: #8b0000; }
        #btn-place { bottom: 20px; right: 100px; background: #228b22; }
        
        /* Joystick Area */
        #joy-shell { position: absolute; bottom: 20px; left: 20px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: white; border-radius: 50%; opacity: 0.5; }

        .recipe { width: 100%; margin: 5px 0; padding: 10px; background: #444; color: white; border: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="hud">
            Items: <span id="count">0</span><br>
            Using: <span id="mat-name">Grass</span>
        </div>

        <button id="btn-craft" class="btn" onclick="openCraft()">CRAFT</button>

        <div id="craft-menu" id="menu">
            <h3>CRAFTING</h3>
            <button class="recipe" onclick="doCraft('Stone', 2)">2 Items -> Stone</button>
            <button class="recipe" onclick="doCraft('Gold', 5)">5 Items -> Gold</button>
            <button class="recipe" onclick="openCraft()" style="background:red">CLOSE</button>
        </div>

        <div id="joy-shell"><div id="joy-stick"></div></div>
        <div id="btn-jump" class="btn">JUMP</div>
        <div id="btn-place" class="btn">BUILD</div>
        <div id="btn-dig" class="btn">DIG</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light, new THREE.AmbientLight(0x666666));

        // --- MATERIALS ---
        const mats = {
            Grass: new THREE.MeshLambertMaterial({ color: 0x567d46 }),
            Stone: new THREE.MeshLambertMaterial({ color: 0x808080 }),
            Gold: new THREE.MeshLambertMaterial({ color: 0xffd700 }),
            Drop: new THREE.MeshLambertMaterial({ color: 0xffffff })
        };
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const dropGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);

        // --- STATE ---
        let items = 0;
        let activeMat = 'Grass';
        const worldBlocks = [];
        const activeDrops = [];

        // --- UI FUNCTIONS ---
        window.openCraft = () => {
            const m = document.getElementById('craft-menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        };

        window.doCraft = (type, cost) => {
            if (items >= cost) {
                items -= cost;
                activeMat = type;
                updateHUD();
                window.openCraft();
            }
        };

        function updateHUD() {
            document.getElementById('count').innerText = items;
            document.getElementById('mat-name').innerText = activeMat;
        }

        // --- GENERATE WORLD ---
        for (let x = -7; x < 7; x++) {
            for (let z = -7; z < 7; z++) {
                const b = new THREE.Mesh(boxGeo, mats.Grass);
                b.position.set(x, 0, z);
                scene.add(b);
                worldBlocks.push(b);
            }
        }

        // --- CONTROLS ---
        let moveX = 0, moveZ = 0;
        camera.position.set(0, 2, 5);

        // Movement (Joystick)
        const joy = document.getElementById('joy-shell');
        joy.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const r = joy.getBoundingClientRect();
            moveX = (t.clientX - (r.left + 50)) / 50;
            moveZ = (t.clientY - (r.top + 50)) / 50;
        });
        joy.addEventListener('touchend', () => { moveX = 0; moveZ = 0; });

        // Digging
        document.getElementById('btn-dig').addEventListener('touchstart', () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(worldBlocks);
            if (hits.length > 0 && hits[0].distance < 4) {
                const target = hits[0].object;
                // Create Drop
                const d = new THREE.Mesh(dropGeo, mats.Drop);
                d.position.copy(target.position);
                scene.add(d);
                activeDrops.push(d);
                // Remove Block
                scene.remove(target);
                worldBlocks.splice(worldBlocks.indexOf(target), 1);
            }
        });

        // Building
        document.getElementById('btn-place').addEventListener('touchstart', () => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(worldBlocks);
            if (hits.length > 0 && hits[0].distance < 4) {
                const b = new THREE.Mesh(boxGeo, mats[activeMat]);
                const pos = hits[0].point.add(hits[0].face.normal);
                b.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
                scene.add(b);
                worldBlocks.push(b);
            }
        });

        // --- GAME LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            
            // Move Player
            camera.translateX(moveX * 0.1);
            camera.translateZ(moveZ * 0.1);
            camera.position.y = 2; // Keep eyes at 2 blocks high

            // Handle Drops
            for (let i = activeDrops.length - 1; i >= 0; i--) {
                activeDrops[i].rotation.y += 0.05;
                if (activeDrops[i].position.distanceTo(camera.position) < 1.5) {
                    scene.remove(activeDrops[i]);
                    activeDrops.splice(i, 1);
                    items++;
                    updateHUD();
                }
            }
            renderer.render(scene, camera);
        }
        loop();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
